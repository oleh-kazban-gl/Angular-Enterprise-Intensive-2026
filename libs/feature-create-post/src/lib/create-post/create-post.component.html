<section class="create-post">
  <gl-card class="create-post__card">
    <div card-header class="create-post__header">
      <span>{{ 'createPost.title' | translate }}</span>
      <button mat-button color="primary" type="button">{{ 'createPost.share' | translate }}</button>
    </div>

    <div card-content class="create-post__body">
      <!-- Left: image preview -->
      <div class="create-post__preview">
        <div class="create-post__placeholder">
          <mat-icon>image</mat-icon>
          <span>{{ 'createPost.selectPhoto' | translate }}</span>
        </div>
      </div>

      <!-- Right: post details -->
      <div class="create-post__form">
        <div class="create-post__author">
          <div class="create-post__avatar"></div>
          <span class="create-post__username">username</span>
        </div>

        <textarea
          class="create-post__caption"
          [placeholder]="'createPost.captionPlaceholder' | translate"
          maxlength="2200"
          rows="8"
          [attr.aria-label]="'createPost.captionPlaceholder' | translate"
        ></textarea>

        <div class="create-post__char-count">0 / 2,200</div>

        <div class="create-post__divider"></div>

        <label class="create-post__field">
          <span class="create-post__field-label">{{ 'createPost.addLocation' | translate }}</span>
          <mat-icon class="create-post__field-icon">location_on</mat-icon>
          <input
            class="create-post__field-input"
            type="text"
            [placeholder]="'createPost.locationPlaceholder' | translate"
            [attr.aria-label]="'createPost.addLocation' | translate"
          />
        </label>

        <div class="create-post__divider"></div>

        <label class="create-post__field">
          <span class="create-post__field-label">{{ 'createPost.addCollaborators' | translate }}</span>
          <mat-icon class="create-post__field-icon">person_add</mat-icon>
          <input
            class="create-post__field-input"
            type="text"
            [placeholder]="'createPost.searchPeople' | translate"
            [attr.aria-label]="'createPost.addCollaborators' | translate"
          />
        </label>
      </div>
    </div>
  </gl-card>
</section>
