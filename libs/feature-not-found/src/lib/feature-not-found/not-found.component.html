<section class="not-found">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Page not found</mat-card-title>
      <mat-card-subtitle>We couldn’t find what you were looking for.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p>The page you tried to access does not exist. Try heading back to the feed to continue exploring.</p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" routerLink="/feed">Go home</button>
    </mat-card-actions>
  </mat-card>
</section>
