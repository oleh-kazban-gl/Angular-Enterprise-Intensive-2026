<mat-sidenav-container class="nav-container">
  <mat-sidenav class="nav-sidenav" mode="side" opened role="navigation">
    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/feed"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        matTooltip="Feed"
        matTooltipPosition="right"
        aria-label="Feed"
      >
        <mat-icon>home</mat-icon>
      </a>

      <a
        mat-list-item
        routerLink="/profile"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        matTooltip="Profile"
        matTooltipPosition="right"
        aria-label="Profile"
      >
        <mat-icon>person</mat-icon>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="nav-content">
    <main class="nav-main">
      <ng-content></ng-content>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
