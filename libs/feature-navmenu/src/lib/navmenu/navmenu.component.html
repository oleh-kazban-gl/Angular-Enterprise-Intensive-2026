<mat-sidenav-container class="nav-container">
  @if (!isMobile()) {
    <mat-sidenav class="nav-sidenav" mode="side" opened role="navigation">
      <div class="nav-sidenav__body">
        <mat-nav-list class="nav-sidenav__main">
          <a
            mat-list-item
            routerLink="/posts"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            [matTooltip]="'nav.posts' | translate"
            matTooltipPosition="right"
            [attr.aria-label]="'nav.posts' | translate"
          >
            <mat-icon>home</mat-icon>
          </a>

          <a
            mat-list-item
            routerLink="/profile"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            [matTooltip]="'nav.profile' | translate"
            matTooltipPosition="right"
            [attr.aria-label]="'nav.profile' | translate"
          >
            <mat-icon>person</mat-icon>
          </a>

          <a
            mat-list-item
            routerLink="/create-post"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            [matTooltip]="'nav.createPost' | translate"
            matTooltipPosition="right"
            [attr.aria-label]="'nav.createPost' | translate"
          >
            <mat-icon>add_circle_outline</mat-icon>
          </a>
        </mat-nav-list>

        <mat-nav-list class="nav-sidenav__bottom">
          <a
            mat-list-item
            routerLink="/settings"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            [matTooltip]="'nav.settings' | translate"
            matTooltipPosition="right"
            [attr.aria-label]="'nav.settings' | translate"
          >
            <mat-icon>settings</mat-icon>
          </a>
        </mat-nav-list>
      </div>
    </mat-sidenav>
  }

  <mat-sidenav-content class="nav-content">
    @if (pageTitle()) {
      <header class="nav-header">
        <h1 class="nav-header__title">{{ pageTitle() | translate }}</h1>
      </header>
    }
    <main class="nav-main" [class.nav-main--mobile]="isMobile()">
      <ng-content></ng-content>
    </main>

    @if (isMobile()) {
      <nav class="nav-bottom" role="navigation" aria-label="Main navigation">
        <a
          class="nav-bottom__item"
          routerLink="/posts"
          routerLinkActive="nav-bottom__item--active"
          [routerLinkActiveOptions]="{ exact: true }"
          [attr.aria-label]="'nav.posts' | translate"
        >
          <mat-icon>home</mat-icon>
        </a>

        <a
          class="nav-bottom__item"
          routerLink="/profile"
          routerLinkActive="nav-bottom__item--active"
          [routerLinkActiveOptions]="{ exact: true }"
          [attr.aria-label]="'nav.profile' | translate"
        >
          <mat-icon>person</mat-icon>
        </a>

        <a
          class="nav-bottom__item"
          routerLink="/create-post"
          routerLinkActive="nav-bottom__item--active"
          [routerLinkActiveOptions]="{ exact: true }"
          [attr.aria-label]="'nav.createPost' | translate"
        >
          <mat-icon>add_circle_outline</mat-icon>
        </a>

        <a
          class="nav-bottom__item"
          routerLink="/settings"
          routerLinkActive="nav-bottom__item--active"
          [routerLinkActiveOptions]="{ exact: true }"
          [attr.aria-label]="'nav.settings' | translate"
        >
          <mat-icon>settings</mat-icon>
        </a>
      </nav>
    }
  </mat-sidenav-content>
</mat-sidenav-container>
