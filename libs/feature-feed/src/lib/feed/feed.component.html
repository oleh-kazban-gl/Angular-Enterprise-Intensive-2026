@let postRecords = posts();

<section class="feed">
  <div class="posts">
    @if (postRecords.length) {
      @for (post of postRecords; track post.id) {
        <gl-card class="feed__card">
          <div card-header class="post-header">
            <div class="avatar"></div>
            <div class="post-meta">
              <div class="post-author">{{ post.author }}</div>
              <div class="post-time">{{ post.time }}</div>
            </div>
          </div>

          <div card-content class="post-body">
            <img
              class="feed__image"
              [ngSrc]="post.image"
              width="1200"
              height="800"
              [alt]="`Photo by ${post.author}`"
              (click)="goToPost(post.id)"
            />
            <p>{{ post.caption }}</p>
          </div>

          <div card-footer class="post-actions">
            <button mat-button (click)="likePost(post); $event.stopPropagation()">
              <mat-icon>favorite_border</mat-icon>
              Like
            </button>
            <button mat-button (click)="$event.stopPropagation()">
              <mat-icon>chat_bubble_outline</mat-icon>
              Comment
            </button>
          </div>
        </gl-card>
      }
    } @else {
      <div>No posts yet :(</div>
    }
  </div>
</section>
