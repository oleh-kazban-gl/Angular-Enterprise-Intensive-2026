@if (loading()) {
  <gl-loading />
} @else {
  @let postRecords = posts();

  <section class="feed">
    <div class="posts">
      @if (postRecords.length) {
        @for (post of postRecords; track post.id; let idx = $index) {
          <gl-card class="feed__card">
            <div card-header class="post-header">
              <div class="avatar"></div>
              <div class="post-meta">
                <div class="post-author">{{ post.author }}</div>
                <div class="post-time">{{ post.time }}</div>
              </div>
            </div>

            <div card-content class="post-body">
              <gl-carousel
                class="feed__image"
                [images]="post.images"
                [label]="'Photos by ' + post.author"
                (click)="goToPost(post.id)"
              />
              <p>{{ post.caption }}</p>
            </div>

            <div card-footer class="post-actions">
              <button mat-button [attr.aria-pressed]="post.liked" (click)="toggleLike(post); $event.stopPropagation()">
                <mat-icon>{{ post.liked ? 'favorite' : 'favorite_border' }}</mat-icon>
                {{ 'feed.like' | translate }}
              </button>
              <button mat-button (click)="$event.stopPropagation()">
                <mat-icon>chat_bubble_outline</mat-icon>
                {{ 'feed.comment' | translate }}
              </button>
            </div>
          </gl-card>
        }
      } @else {
        <div>{{ 'feed.noPosts' | translate }}</div>
      }
    </div>
  </section>
}
