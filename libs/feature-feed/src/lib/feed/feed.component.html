@if (loading()) {
  <gl-loading />
} @else {
  @let ids = postIds();
  @let paging = pagination();

  <section class="feed">
    @if (ids.length) {
      @for (id of ids; track id) {
        <gl-post-card
          class="feed__card"
          [postId]="id"
          (openDetail)="goToPost($event)"
        />
      }
    } @else {
      <div>{{ 'feed.noPosts' | translate }}</div>
    }

    @if (paging) {
      <mat-paginator
        class="feed__paginator"
        [length]="paging.totalItems"
        [pageSize]="paging.size"
        [pageIndex]="paging.page - 1"
        [pageSizeOptions]="[5, 10, 20]"
        [showFirstLastButtons]="true"
        aria-label="Feed pagination"
        (page)="onPageChange($event)"
      />
    }
  </section>
}
