@let postItem = post();

<section class="post">
  @if (postItem) {
    <gl-card class="post-card">
      <div card-header class="post-header">
        <div class="avatar"></div>
        <div class="post-meta">
          <div class="post-author">{{ postItem.author | uppercase }}</div>
          <div class="post-date">
            {{ postItem.createdAt | date: 'dd.MM.yyyy' }} <span class="post-time">({{ postItem.time }})</span>
          </div>
        </div>
      </div>

      <div card-content class="post-body">
        <img
          class="post-image"
          [ngSrc]="postItem.image"
          width="1200"
          height="800"
          [alt]="`Photo by ${postItem.author}`"
        />
        <p>{{ postItem.caption }}</p>
      </div>

      <div card-footer class="post-actions">
        <button mat-button (click)="like()">
          <mat-icon>favorite_border</mat-icon>
          Like
        </button>
        <button mat-button (click)="goBack()">
          <mat-icon>arrow_back</mat-icon>
          Back
        </button>
      </div>
    </gl-card>
  } @else {
    <div class="post-missing">
      <p>Post not found.</p>
      <button mat-button (click)="goBack()">Back to feed</button>
    </div>
  }
</section>
