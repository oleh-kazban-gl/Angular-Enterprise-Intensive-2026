services:

  # ── Angular app (nginx) ──────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "4200:80"       # http://localhost:4200  → same port as ng serve
    depends_on:
      - api

  # ── REST API (json-server) ───────────────────────────────────────────────
  api:
    image: node:22-alpine
    working_dir: /app
    # --host 0.0.0.0 makes json-server reachable from other containers
    command: npx --yes json-server db.json --port 3333 --host 0.0.0.0
    ports:
      - "3333:3333"     # expose for direct debugging from the host
    volumes:
      - ./db.json:/app/db.json
