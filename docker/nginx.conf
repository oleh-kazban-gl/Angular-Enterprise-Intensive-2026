server {
    listen 80;
    server_name localhost;

    # Use Docker's embedded DNS so upstream hostnames are resolved at
    # request time (lazy) instead of at nginx startup, which avoids
    # "host not found in upstream" when the api container isn't ready yet.
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ────────────────────────────────────────────────────────────
    # Mirrors the dev proxy.conf.json:
    #   /api/v1/posts → http://api:3333/posts  (prefix is stripped)
    location /api/v1/ {
        set $upstream http://api:3333;
        rewrite ^/api/v1/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # Return index.html for any route unknown to nginx so Angular Router
    # can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
