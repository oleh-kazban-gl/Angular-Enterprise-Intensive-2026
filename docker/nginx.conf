server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ────────────────────────────────────────────────────────────
    # Mirrors the dev proxy.conf.json:
    #   /api/v1/posts → http://api:3333/posts  (prefix is stripped)
    location /api/v1/ {
        proxy_pass         http://api:3333/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # Return index.html for any route unknown to nginx so Angular Router
    # can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
